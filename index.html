<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Google Tag Manager -->
    <script>(function(w,d,s,l,i){w[l]=w[l]||[];w[l].push({'gtm.start':
    new Date().getTime(),event:'gtm.js'});var f=d.getElementsByTagName(s)[0],
    j=d.createElement(s),dl=l!='dataLayer'?'&l='+l:'';j.async=true;j.src=
    'https://www.googletagmanager.com/gtm.js?id='+i+dl;f.parentNode.insertBefore(j,f);
    })(window,document,'script','dataLayer','GTM-T72GCGQG');</script>
    <!-- End Google Tag Manager -->

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Collection Form</title>
    <style>
        body { font-family: sans-serif; padding: 20px; max-width: 500px; margin: auto; }
        label { display: block; margin-top: 10px; font-weight: bold; }
        input { width: 100%; padding: 8px; margin-top: 5px; margin-bottom: 10px; }
        button { background-color: #0073b1; color: white; padding: 10px 20px; border: none; cursor: pointer; }
        button:hover { background-color: #005582; }
        #message { margin-top: 15px; font-weight: bold; color: #0073b1; }
    </style>

    <script>
        // SHA-256 hex hash with LinkedIn normalization (trim + lowercase).
        // NOTE: crypto.subtle only exists on a secure context (https:// or http://localhost).
        async function hashEmail(email) {
            const encoder = new TextEncoder();
            const data = encoder.encode(email.trim().toLowerCase());
            const hashBuffer = await crypto.subtle.digest('SHA-256', data);
            return Array.from(new Uint8Array(hashBuffer))
                .map(b => b.toString(16).padStart(2, '0')).join('');
        }

        // Capture li_fat_id from the landing URL (?li_fat_id=...) on page load.
        function setLiFatId() {
            const liFatId = new URLSearchParams(window.location.search).get('li_fat_id');
            if (liFatId) document.getElementById('li_fat_id').value = liFatId;
        }

        window.onload = setLiFatId;
    </script>
</head>
<body>

    <!-- Google Tag Manager (noscript) -->
    <noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-T72GCGQG"
    height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>
    <!-- End Google Tag Manager (noscript) -->

    <h2>Submit User Data</h2>

    <form id="capiDemoForm" name="capiDemoForm">
        <input type="hidden" id="conversion_rule_id" value="">

        <label for="li_fat_id">li_fat_id</label>
        <input type="text" id="li_fat_id" name="li_fat_id" placeholder="LinkedIn First Party Cookie ID">

        <label for="firstname">First Name</label>
        <input type="text" id="firstname" name="firstname" required>

        <label for="lastname">Last Name</label>
        <input type="text" id="lastname" name="lastname" required>

        <label for="email">Email</label>
        <input type="email" id="email" name="email" required>

        <label for="hashed_email">Hashed Email (SHA-256)</label>
        <input type="text" id="hashed_email" name="hashed_email" placeholder="Auto-generated on submit">

        <label for="jobtitle">Job Title</label>
        <input type="text" id="jobtitle" name="jobtitle">

        <label for="company">Company</label>
        <input type="text" id="company" name="company">

        <label for="country">Country Code (ISO2)</label>
        <input type="text" id="country" name="country" placeholder="e.g., US, AU, GB">

        <label for="currency">Currency</label>
        <input type="text" id="currency" name="currency" placeholder="e.g., USD">

        <label for="value">Value</label>
        <input type="number" step="0.01" id="value" name="value" placeholder="0.00">

        <button type="submit">Submit Data</button>
        <button type="reset" style="background-color: #666; margin-left: 10px;">Reset</button>
    </form>

    <div id="message"></div>

    <script>
        document.getElementById('capiDemoForm').addEventListener('submit', async function (e) {
            e.preventDefault(); // Stop the native page reload

            // 1. Normalize + hash the email. Guarded so a hash failure can NEVER block the push.
            const emailRaw = document.getElementById('email').value.trim().toLowerCase();
            let hashedEmail = '';
            try {
                if (window.crypto && crypto.subtle) {
                    hashedEmail = await hashEmail(emailRaw);
                    document.getElementById('hashed_email').value = hashedEmail;
                } else {
                    console.warn('crypto.subtle unavailable (insecure origin) — sending RAW email; hash it server-side.');
                }
            } catch (err) {
                console.error('Email hashing failed:', err);
            }

            // 2. Read the form ONCE, AFTER hashing (declared before any use — no TDZ error)
            const formData = new FormData(e.target);
            const timestamp = Date.now();
            const eventId = 'evt_' + timestamp + '_' + Math.floor(Math.random() * 1000000);

            // 3. Push to the data layer.
            //    Keys MUST match the "Data Layer Variable Name" each GTM DLV reads —
            //    which are the SHORT keys (event_id, user_data, …), NOT the long display
            //    names. Long keys → variables resolve undefined → GA4 drops the params.
            window.dataLayer = window.dataLayer || [];
            const payload = {
                'event': 'linkedin_capi_submit',
                'conversion_happened_at': timestamp,
                'currency': formData.get('currency'),
                'event_id': eventId,
                'value': formData.get('value'),
                'user_data': {
                    'li_fat_id': formData.get('li_fat_id'),
                    'email': hashedEmail || emailRaw   // hashed if available, else raw for server-side hashing
                }
            };
            window.dataLayer.push(payload);
            console.log('Data Layer Pushed:', JSON.stringify(payload, null, 2));

            // 4. Show confirmation only — no navigation. The form no longer posts anywhere,
            //    so the dataLayer, console logs, and GTM tags all persist for inspection.
            document.getElementById('message').textContent = 'Your lead info has been submitted.';
        });
    </script>

</body>
</html>
